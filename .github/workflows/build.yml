name: Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  validate-dotnet-8:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Veltis.Workspace.sln --configfile NuGet.Config

      - name: Build
        run: dotnet build Veltis.Workspace.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Veltis.Workspace.sln --configuration Release --no-build --verbosity normal
